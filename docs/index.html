<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>合规审查系统 · 模拟审查演示</title>
<meta name="description" content="合规审查系统 —— 材料提交后如何被审查：查了哪些法规、风险等级如何判定、哪些需要人工复核">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EBEEF2;
    --panel: #FFFFFF;
    --border: oklch(0.88 0.012 248);
    --border-strong: oklch(0.78 0.016 248);
    --text: oklch(0.22 0.016 250);
    --text-2: oklch(0.42 0.018 250);
    --text-3: oklch(0.58 0.014 250);
    --primary: oklch(0.50 0.15 255);
    --primary-bg: oklch(0.94 0.025 255);
    --success: oklch(0.52 0.12 160);
    --success-bg: oklch(0.94 0.035 160);
    --warning: oklch(0.62 0.13 70);
    --warning-bg: oklch(0.94 0.04 70);
    --danger: oklch(0.54 0.16 26);
    --danger-bg: oklch(0.94 0.03 26);
    --gray: oklch(0.56 0.012 250);
    --gray-bg: oklch(0.92 0.008 250);
    --font-sans: 'Space Grotesk', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-sans);
    font-size: 14px; -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }
  [data-color="green"] { --c: var(--success); --c-bg: var(--success-bg); }
  [data-color="amber"] { --c: var(--warning); --c-bg: var(--warning-bg); }
  [data-color="red"]   { --c: var(--danger);  --c-bg: var(--danger-bg); }
  [data-color="blue"]  { --c: var(--primary); --c-bg: var(--primary-bg); }
  [data-color="gray"]  { --c: var(--gray);    --c-bg: var(--gray-bg); }

  .page { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .topbar { background:#fff; border-bottom:1px solid var(--border); padding:0 26px; height:60px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-shrink:0; }
  .brand { display:flex; align-items:center; gap:12px; }
  .brand-mark { width:34px; height:34px; border-radius:9px; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; flex-shrink:0; }
  .brand-text { display:flex; flex-direction:column; line-height:1.3; }
  .brand-name { font-size:16px; font-weight:600; color:var(--text); }
  .brand-sub { font-size:12px; color:var(--text-3); }
  .btn {
    display:inline-flex; align-items:center; gap:6px; height:32px; padding:0 14px; border-radius:5px;
    font-size:12.5px; text-decoration:none; border:1px solid var(--border-strong); color:var(--text-2);
    background:#fff; transition:.15s; white-space:nowrap;
  }
  .btn:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-bg); }

  .layout { flex:1; display:flex; gap:16px; padding:16px 26px; min-height:0; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:8px; overflow:hidden; min-width:0; flex-shrink:0; }
  .panel-head {
    padding:9px 18px; border-bottom:1px solid var(--border); font-size:13px; font-weight:600;
    display:flex; align-items:center; justify-content:space-between; color:var(--text); flex-shrink:0;
  }
  .panel-head .count { font-weight:400; color:var(--text-3); font-size:12px; }

  .sidebar-panel { display:flex; flex-direction:column; min-height:0; flex:0 0 300px; }
  .case-list { overflow-y:auto; flex:1; }
  .group-label {
    padding:9px 16px 5px; font-size:11px; font-weight:600; color:var(--text-3);
    letter-spacing:.04em; background:#F0F2F5;
  }
  .group-label .group-count { font-weight:400; }
  .case-row {
    display:block; width:100%; text-align:left; background:none; border:none;
    border-bottom:1px solid var(--border); border-right:3px solid transparent;
    padding:9px 14px; cursor:pointer; font-family:inherit; color:var(--text);
  }
  .case-row:hover { background:#F3F5F8; }
  .case-row.active { background:var(--primary-bg); border-right-color:var(--primary); }
  .case-row-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px; }
  .case-id { font-family:var(--font-mono); font-size:12.5px; font-weight:600; color:var(--text); }
  .case-row.active .case-id { color:var(--primary); }
  .case-desc {
    font-size:12px; color:var(--text-2); line-height:1.5;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .case-row.no-trace .case-desc { color:var(--text-3); }

  .tag {
    display:inline-flex; align-items:center; height:21px; padding:0 8px; border-radius:4px;
    font-size:11.5px; border:1px solid var(--c); color:var(--c); background:var(--c-bg);
    font-weight:500; white-space:nowrap; line-height:1;
  }
  .tag-plain { border-color:var(--border-strong); color:var(--text-3); background:#fff; }
  .tag-lg { height:26px; padding:0 12px; font-size:13px; font-weight:600; }

  .main-col { display:flex; flex-direction:column; gap:14px; min-height:0; min-width:0; flex:1 1 0%; overflow-y:auto; }

  .summary-card { padding:13px 20px; }
  .summary-title { font-size:16px; font-weight:600; margin-bottom:4px; }
  .summary-row { display:flex; gap:14px; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; align-items:baseline; }
  .summary-row:last-child { border-bottom:none; }
  .summary-label { width:52px; flex-shrink:0; color:var(--text-3); }
  .summary-value { flex:1; color:var(--text); line-height:1.55; }

  .steps-wrap { padding:14px 20px 12px; overflow-x:auto; }
  .steps-row { display:flex; align-items:flex-start; width:max-content; min-width:100%; }
  .step-item { display:flex; flex-direction:column; align-items:center; width:88px; flex-shrink:0; position:relative; }
  .step-circle {
    width:24px; height:24px; border-radius:50%; border:2px solid var(--border-strong);
    display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;
    color:var(--text-3); background:#fff; z-index:1;
  }
  .step-circle[data-color] { border-color:var(--c); background:var(--c); color:#fff; }
  .step-title { margin-top:6px; font-size:11.5px; font-weight:500; color:var(--text); text-align:center; line-height:1.3; }
  .step-connector {
    position:absolute; top:11px; left:calc(50% + 12px); width:calc(100% - 24px); height:2px;
    background:var(--border-strong);
  }
  .step-connector[data-color] { background:var(--c); }
  .step-connector.dashed { background-image:repeating-linear-gradient(90deg, var(--border-strong) 0 5px, transparent 5px 10px); background-color:transparent; }

  .detail-panel { flex:1 1 auto; min-height:120px; display:flex; flex-direction:column; flex-shrink:1; }
  .detail-body { flex:1; overflow-y:auto; padding:6px 20px 18px; }
  .narr-item { display:grid; grid-template-columns:26px 1fr; column-gap:14px; }
  .narr-rail { position:relative; display:flex; justify-content:center; }
  .narr-rail::before { content:''; position:absolute; top:26px; bottom:-12px; width:2px; background:var(--border); }
  .narr-item:last-child .narr-rail::before { display:none; }
  .narr-num {
    width:24px; height:24px; border-radius:50%; background:var(--c); color:#fff; display:flex;
    align-items:center; justify-content:center; font-size:11.5px; font-weight:700; font-family:var(--font-mono); z-index:1; margin-top:8px;
  }
  .narr-content { padding:8px 0 16px; }
  .narr-title { font-weight:600; font-size:13.5px; margin-bottom:3px; }
  .narr-text { font-size:13px; color:var(--text-2); line-height:1.65; }
  .narr-text b { color:var(--text); font-weight:600; }

  .hitl-divider {
    display:flex; align-items:center; gap:10px; color:var(--warning); font-weight:600;
    font-size:11.5px; letter-spacing:.06em; margin:2px 0 6px 40px;
  }
  .hitl-divider::before, .hitl-divider::after { content:''; flex:1; height:1px; background:var(--warning); opacity:.35; }

  .empty-state {
    margin:16px 20px; border:1px dashed var(--border-strong); border-radius:8px; text-align:center;
    color:var(--text-2); font-size:13px; line-height:1.9; padding:36px 26px;
  }
  .empty-state .tag { margin-bottom:14px; }

  .footer { border-top:1px solid var(--border); background:#fff; padding:13px 26px; color:var(--text-3); font-size:12px; line-height:1.8; flex-shrink:0; }
  .footer a { color:var(--primary); text-decoration:none; }
  .footer a:hover { text-decoration:underline; }

  @media (max-width: 900px) {
    .layout { flex-direction:column; overflow-y:auto; }
    .sidebar-panel { max-height:280px; flex:0 0 auto; }
    .page { overflow-y:auto; height:auto; min-height:100vh; }
  }
  @media (max-width: 600px) {
    .topbar, .layout, .footer { padding-left:14px; padding-right:14px; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">审</div>
      <div class="brand-text">
        <span class="brand-name">合规审查系统</span>
        <span class="brand-sub">模拟审查流程 · 13 份测试材料</span>
      </div>
    </div>
    <a class="btn" href="https://github.com/lesPrivilege/compliance-review-agent">查看源码 ↗</a>
  </header>

  <div class="layout">
    <div class="main-col">
      <div class="panel"><div id="caseHeader"></div></div>
      <div class="panel">
        <div class="panel-head">审查流程</div>
        <div class="steps-wrap"><div class="steps-row" id="graphRow"></div></div>
      </div>
      <div class="panel detail-panel">
        <div class="panel-head">审查详情</div>
        <div class="detail-body" id="detailBody"></div>
      </div>
    </div>

    <div class="panel sidebar-panel">
      <div class="panel-head">材料列表 <span class="count" id="caseCount"></span></div>
      <div class="case-list" id="sidebar"></div>
    </div>
  </div>

  <footer class="footer">
    以上为 13 份模拟材料的合规审查流程演示，数据基于真实业务规则、经脱敏合成。
    配套工具：<a href="https://lesprivilege.github.io/agent-quality-workbench/">Agent 质量评估工作台</a> · <a href="https://lesprivilege.github.io/contract-approval-agent/">合同审批系统</a> · <a href="https://github.com/lesPrivilege/compliance-review-agent">查看源码</a>
  </footer>

</div>

<script src="demo-data.js"></script>
<script>
(function () {
  var RISK_LABEL = { low: '低风险', medium: '中等风险', high: '高风险' };
  var OUTCOME_LABEL = { auto_approved: '自动通过', approved: '人工复核通过', rejected: '人工复核驳回' };

  function decisionColor(d) {
    if (d === 'auto_approved' || d === 'approved' || d === 'low') return 'green';
    if (d === 'rejected' || d === 'high') return 'red';
    if (d === 'medium') return 'amber';
    if (d === 'missing' || d === 'not_found') return 'amber';
    return 'blue';
  }
  function stepIcon(color) {
    return { green: '✓', blue: '✓', red: '✕', amber: '!', gray: '–' }[color] || '';
  }
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }
  function fmtAmount(n) { return n == null ? '' : '¥' + Number(n).toLocaleString('zh-CN'); }
  function tag(text, color, opts) {
    opts = opts || {};
    var cls = 'tag' + (color ? '' : ' tag-plain') + (opts.lg ? ' tag-lg' : '');
    return '<span class="' + cls + '"' + (color ? ' data-color="' + color + '"' : '') + '>' + esc(text) + '</span>';
  }

  // ---- output_summary -> business narrative ----
  function ingestNarrative(step) {
    var m = step.output_summary.match(/提取 (\d+) 个关键条款[:：]\s*(.*)/);
    if (m) return m[1] === '0' ? '未发现需要特别关注的条款' : '提取到 ' + m[1] + ' 个关键条款：' + m[2];
    return step.output_summary;
  }
  function retrieveNarrative(step) {
    var m = step.output_summary.match(/检索到 (\d+) 条法规/);
    if (m) return m[1] === '0' ? '法规库中未找到直接相关的条文，需结合通用规则判断' : '检索到 ' + m[1] + ' 条相关法规';
    return step.output_summary;
  }
  function analyzeNarrative(step) {
    return step.output_summary.replace('需人工确认', '需人工复核');
  }
  function hitlNarrative(step, risk) {
    if (step.action === 'auto_approve') return '系统自动通过（' + (RISK_LABEL[risk] || '低风险') + '，无需人工复核）';
    if (step.decision === 'approved') return '人工复核通过';
    if (step.decision === 'rejected') return '人工复核驳回';
    return step.output_summary;
  }

  var sidebarEl = document.getElementById('sidebar');
  var caseCountEl = document.getElementById('caseCount');
  var caseHeaderEl = document.getElementById('caseHeader');
  var graphRowEl = document.getElementById('graphRow');
  var detailBodyEl = document.getElementById('detailBody');
  var selectedId = null;

  var NODES = [
    { key: '__start',  title: '材料提交' },
    { key: 'ingest',   title: '材料解析' },
    { key: 'retrieve', title: '法规检索' },
    { key: 'analyze',  title: '合规分析' },
    { key: 'score',    title: '风险评定' },
    { key: 'hitl',     title: '人工复核' },
    { key: '__end',    title: '审查报告' }
  ];

  function caseRowHtml(m) {
    var badge = m.hasTrace ? tag(RISK_LABEL[m.risk], decisionColor(m.risk)) : tag('复杂场景', null);
    return '' +
      '<button class="case-row' + (m.hasTrace ? '' : ' no-trace') + '" data-id="' + m.id + '">' +
        '<div class="case-row-top"><span class="case-id">' + m.id + '</span>' + badge + '</div>' +
        '<div class="case-desc">' + esc(m.说明 || m.内容摘要 || '') + '</div>' +
      '</button>';
  }

  function renderSidebar() {
    caseCountEl.textContent = MATERIALS.length;
    var groups = [
      { label: '低风险', items: MATERIALS.filter(function (m) { return m.hasTrace && m.risk === 'low'; }) },
      { label: '中等风险', items: MATERIALS.filter(function (m) { return m.hasTrace && m.risk === 'medium'; }) },
      { label: '高风险', items: MATERIALS.filter(function (m) { return m.hasTrace && m.risk === 'high'; }) },
      { label: '复杂场景', items: MATERIALS.filter(function (m) { return !m.hasTrace; }) }
    ];
    var html = '';
    groups.forEach(function (g) {
      if (!g.items.length) return;
      html += '<div class="group-label">' + g.label + ' <span class="group-count">' + g.items.length + '</span></div>';
      g.items.forEach(function (m) { html += caseRowHtml(m); });
    });
    sidebarEl.innerHTML = html;
    sidebarEl.querySelectorAll('.case-row').forEach(function (row) {
      row.addEventListener('click', function () { selectCase(row.getAttribute('data-id'), true); });
    });
  }

  function markActive() {
    sidebarEl.querySelectorAll('.case-row').forEach(function (row) {
      row.classList.toggle('active', row.getAttribute('data-id') === selectedId);
    });
  }

  function renderSummaryCard(m) {
    var html = '<div class="summary-card">';
    html += '<div class="summary-title">' + m.id + ' · ' + esc(m.板块 || '') + '板块 · ' + esc(m.材料类型 || '') + '</div>';
    html += '<div class="summary-row"><span class="summary-label">金额</span><span class="summary-value">' + (m.金额 != null ? fmtAmount(m.金额) : '—') + '</span></div>';
    html += '<div class="summary-row"><span class="summary-label">摘要</span><span class="summary-value">' + esc(m.内容摘要 || '') + '</span></div>';
    if (m.hasTrace) {
      html += '<div class="summary-row"><span class="summary-label">结果</span><span class="summary-value">' + tag(RISK_LABEL[m.risk], decisionColor(m.risk)) + ' &nbsp;·&nbsp; ' + tag(OUTCOME_LABEL[m.outcome] || m.outcome, m.outcome === 'rejected' ? 'red' : 'green') + '</span></div>';
    } else {
      html += '<div class="summary-row"><span class="summary-label">状态</span><span class="summary-value">' + tag('复杂场景 · 暂无记录', null) + '</span></div>';
    }
    html += '</div>';
    caseHeaderEl.innerHTML = html;
  }

  function findStep(trace, key) { return trace.filter(function (s) { return s.node === key; })[0]; }

  function stepColor(node) {
    if (node.key === '__start' || node.key === '__end') return 'blue';
    var step = node._step;
    if (!step) return null;
    if (step.node === 'hitl') return step.action === 'human_review' ? (step.decision === 'rejected' ? 'red' : 'green') : 'green';
    return decisionColor(step.decision);
  }

  function renderGraph(m) {
    var trace = TRACE[m.id];
    var nodes = NODES.map(function (n) { return { key: n.key, title: n.title, _step: trace ? findStep(trace, n.key) : null }; });
    var html = '';
    nodes.forEach(function (node, i) {
      var reached = node.key === '__start' ? !!trace : (node.key === '__end' ? !!trace : !!node._step);
      var color = reached ? stepColor(node) : null;
      html += '<div class="step-item">';
      if (i > 0) {
        var prevReached = nodes[i - 1].key === '__start' ? !!trace : !!nodes[i - 1]._step;
        html += '<div class="step-connector' + ((prevReached && reached) ? '' : ' dashed') + '"' + ((prevReached && reached && color) ? ' data-color="' + color + '"' : '') + '></div>';
      }
      html += '<div class="step-circle"' + (color ? ' data-color="' + color + '"' : '') + '>' + (color ? stepIcon(color) : '') + '</div>';
      html += '<div class="step-title">' + node.title + '</div>';
      html += '</div>';
    });
    graphRowEl.innerHTML = html;
  }

  function renderDetail(m) {
    var trace = TRACE[m.id];
    if (!trace) {
      detailBodyEl.innerHTML = '' +
        '<div class="empty-state">' +
          tag('复杂场景 · 暂无记录', null) +
          '<div>该材料需要系统进行多轮法规检索与智能分析（' + esc(m.说明 || '') + '），涉及真实模型调用，静态演示无法回放。完整测试覆盖见源码。</div>' +
        '</div>';
      return;
    }
    var items = [];
    items.push({ title: '材料提交', text: '材料已提交，进入合规审查流程', color: 'blue' });
    trace.forEach(function (step) {
      if (step.node === 'ingest') items.push({ title: '材料解析', text: ingestNarrative(step), color: decisionColor(step.decision) });
      else if (step.node === 'retrieve') items.push({ title: '法规检索', text: retrieveNarrative(step), color: decisionColor(step.decision) });
      else if (step.node === 'analyze') items.push({ title: '合规分析', text: analyzeNarrative(step), color: decisionColor(step.decision) });
      else if (step.node === 'score') items.push({ title: '风险评定', tagText: RISK_LABEL[step.decision], color: decisionColor(step.decision) });
      else if (step.node === 'hitl') {
        var isHuman = step.action === 'human_review';
        items.push({ title: '人工复核', text: hitlNarrative(step, m.risk), color: isHuman ? (step.decision === 'rejected' ? 'red' : 'green') : 'green', divider: isHuman });
      }
    });
    items.push({ title: '审查报告', text: '审查报告已生成，审查依据与结论均可追溯', color: 'blue' });

    var html = '';
    items.forEach(function (item) {
      if (item.divider) html += '<div class="hitl-divider"><span>以下由人工判断</span></div>';
      html += '<div class="narr-item" data-color="' + item.color + '">' +
        '<div class="narr-rail"><div class="narr-num">' + (items.indexOf(item) + 1) + '</div></div>' +
        '<div class="narr-content">' +
          '<div class="narr-title">' + item.title + '</div>' +
          (item.tagText ? '<div>' + tag(item.tagText, item.color, { lg: true }) + '</div>' : '<div class="narr-text">' + esc(item.text) + '</div>') +
        '</div>' +
      '</div>';
    });
    detailBodyEl.innerHTML = html;
  }

  function selectCase(id, updateHash) {
    var m = MATERIALS.filter(function (x) { return x.id === id; })[0];
    if (!m) return;
    selectedId = id;
    markActive();
    renderSummaryCard(m);
    renderGraph(m);
    renderDetail(m);
    if (updateHash) history.replaceState(null, '', '#' + id);
  }

  renderSidebar();
  var initial = (location.hash || '').replace('#', '');
  if (!MATERIALS.some(function (m) { return m.id === initial; })) initial = MATERIALS[0].id;
  selectCase(initial, false);

  window.addEventListener('hashchange', function () {
    var id = (location.hash || '').replace('#', '');
    if (MATERIALS.some(function (m) { return m.id === id; })) selectCase(id, false);
  });
})();
</script>
</body>
</html>
